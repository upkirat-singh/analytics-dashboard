<div class="bg-white p-6 rounded-2xl border border-slate-100 shadow-xs hover:shadow-md transition-all duration-300">
  <div class="mb-5">
    <h3 class="text-sm font-bold text-brand-deep tracking-tight uppercase font-display">SEO Search Performance</h3>
    <p class="text-xs text-slate-400">Search keywords visibility and site score</p>
  </div>

  @if (seo(); as data) {
    <div class="grid grid-cols-1 sm:grid-cols-2 gap-6 items-center">
      <!-- Radial Progress Circle -->
      <div class="flex flex-col items-center justify-center">
        <div class="relative w-28 h-28">
          <svg class="w-full h-full transform -rotate-90" viewBox="0 0 100 100">
            <!-- Track circle -->
            <circle class="text-slate-100" stroke-width="8" stroke="currentColor" fill="transparent" r="40" cx="50" cy="50" />
            <!-- Progress circle -->
            <circle class="text-brand-blue-dark transition-all duration-500 ease-out" stroke-width="8" 
              stroke-dasharray="251.2" 
              [attr.stroke-dashoffset]="251.2 - (251.2 * data.score) / 100" 
              stroke-linecap="round" stroke="currentColor" fill="transparent" r="40" cx="50" cy="50" />
          </svg>
          <div class="absolute inset-0 flex flex-col items-center justify-center">
            <span class="text-2xl font-extrabold text-brand-deep tracking-tighter">{{ data.score }}</span>
            <span class="text-[9px] font-bold text-slate-400 uppercase tracking-widest">Score</span>
          </div>
        </div>
      </div>

      <!-- Keyword Positions List -->
      <div class="space-y-2">
        <span class="text-[10px] font-bold text-slate-400 uppercase tracking-wider block mb-2">Tracked Keywords</span>
        @for (kw of data.keywords; track kw.keyword) {
          <div class="flex justify-between items-center text-xs font-semibold py-1.5 border-b border-slate-50 last:border-0">
            <span class="text-slate-600 truncate mr-2">{{ kw.keyword }}</span>
            <div class="flex gap-2.5 flex-shrink-0 text-slate-500">
              <span>Pos <strong class="text-brand-blue-dark font-bold">#{{ kw.position }}</strong></span>
              <span class="text-slate-300">|</span>
              <span>Vol <strong class="text-slate-700 font-bold">{{ kw.searches | number }}</strong></span>
            </div>
          </div>
        }
      </div>
    </div>
  } @else {
    <!-- Loading skeleton -->
    <div class="animate-pulse flex gap-6 items-center">
      <div class="w-28 h-28 bg-slate-100 rounded-full"></div>
      <div class="flex-grow space-y-3">
        <div class="h-3 bg-slate-100 rounded-md w-full"></div>
        <div class="h-3 bg-slate-100 rounded-md w-full"></div>
        <div class="h-3 bg-slate-100 rounded-md w-2/3"></div>
      </div>
    </div>
  }
</div>
