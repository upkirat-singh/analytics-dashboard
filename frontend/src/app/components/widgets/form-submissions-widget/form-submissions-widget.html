<div class="bg-white p-6 rounded-2xl border border-slate-100 shadow-xs hover:shadow-md transition-all duration-300">
  <div class="mb-5">
    <h3 class="text-sm font-bold text-brand-deep tracking-tight uppercase font-display">Recent Form Submissions</h3>
    <p class="text-xs text-slate-400">Latest user leads and contact form status</p>
  </div>

  @if (leads(); as list) {
    <div class="space-y-3">
      @for (lead of list; track lead.timestamp) {
        <div class="flex justify-between items-center p-3 bg-slate-50 border border-slate-100 rounded-xl hover:bg-slate-100/40 transition-colors">
          <div class="flex flex-col">
            <span class="text-xs font-bold text-brand-deep">{{ lead.source }}</span>
            <span class="text-[10px] text-slate-400 font-medium">{{ lead.timestamp }}</span>
          </div>
          
          <span class="text-[10px] font-bold px-2.5 py-0.5 rounded-full" 
            [ngClass]="{
              'bg-brand-teal/10 text-brand-teal': lead.status === 'Contacted' || lead.status === 'Processed',
              'bg-brand-blue/10 text-brand-blue-dark': lead.status === 'Subscribed',
              'bg-amber-50 text-amber-600': lead.status === 'Pending'
            }">
            {{ lead.status }}
          </span>
        </div>
      }
    </div>
  } @else {
    <!-- Loading skeleton -->
    <div class="animate-pulse space-y-3">
      <div class="h-12 bg-slate-100 rounded-xl w-full"></div>
      <div class="h-12 bg-slate-100 rounded-xl w-full"></div>
      <div class="h-12 bg-slate-100 rounded-xl w-full"></div>
    </div>
  }
</div>
