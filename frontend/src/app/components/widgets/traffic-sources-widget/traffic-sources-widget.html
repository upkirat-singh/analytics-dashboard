<div class="bg-white p-6 rounded-2xl border border-slate-100 shadow-xs hover:shadow-md transition-all duration-300">
  <div class="mb-4">
    <h3 class="text-sm font-bold text-brand-deep tracking-tight uppercase font-display">Traffic Channels & Trends</h3>
    <p class="text-xs text-slate-400">Distribution of visits across search, direct, and referral traffic</p>
  </div>

  @if (trends(); as list) {
    <!-- Legend -->
    <div class="flex gap-4 mb-4 text-xs font-semibold">
      <div class="flex items-center gap-1.5 text-slate-600">
        <span class="w-2.5 h-2.5 bg-brand-teal rounded-xs"></span>
        <span>Organic</span>
      </div>
      <div class="flex items-center gap-1.5 text-slate-600">
        <span class="w-2.5 h-2.5 bg-brand-blue rounded-xs"></span>
        <span>Direct</span>
      </div>
      <div class="flex items-center gap-1.5 text-slate-600">
        <span class="w-2.5 h-2.5 bg-brand-crimson rounded-xs"></span>
        <span>Referral</span>
      </div>
    </div>

    <!-- Trend Rows -->
    <div class="space-y-4">
      @for (day of list; track day.date) {
        <div>
          <div class="flex justify-between text-xs font-semibold text-slate-700 mb-1.5">
            <span>{{ day.date }}</span>
            <span class="text-brand-deep font-bold">{{ day.views | number }} visits</span>
          </div>
          <!-- Composite Proportion Bar -->
          <div class="w-full h-3 bg-slate-100 rounded-full overflow-hidden flex">
            <!-- Organic portion -->
            <div class="bg-brand-teal h-full" [style.width.%]="(day.organic / day.views) * 100" title="Organic Search"></div>
            <!-- Direct portion -->
            <div class="bg-brand-blue h-full" [style.width.%]="(day.direct / day.views) * 100" title="Direct Visits"></div>
            <!-- Referral portion -->
            <div class="bg-brand-crimson h-full" [style.width.%]="(day.referral / day.views) * 100" title="Referrals"></div>
          </div>
        </div>
      }
    </div>
  } @else {
    <!-- Loading skeleton -->
    <div class="space-y-4 animate-pulse">
      <div class="h-4 bg-slate-100 rounded-md w-1/3"></div>
      <div class="h-10 bg-slate-100 rounded-md w-full"></div>
      <div class="h-10 bg-slate-100 rounded-md w-full"></div>
      <div class="h-10 bg-slate-100 rounded-md w-full"></div>
    </div>
  }
</div>
