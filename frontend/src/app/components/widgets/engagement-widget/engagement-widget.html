@if (metrics(); as data) {
  <div class="bg-white p-5 rounded-2xl border border-slate-100 shadow-xs hover:shadow-md transition-all duration-300 flex flex-col justify-between h-32">
    <div class="flex justify-between items-start">
      <span class="text-xs font-bold tracking-wider text-slate-400 uppercase">Total Leads</span>
      
      <!-- Trend Badge -->
      @if (data.change.leads > 0) {
        <span class="text-xs font-semibold px-2 py-0.5 rounded-full bg-brand-teal/10 text-brand-teal flex items-center gap-0.5">
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 10l7-7m0 0l7 7m-7-7v18"></path>
          </svg>
          +{{ data.change.leads }}%
        </span>
      } @else if (data.change.leads < 0) {
        <span class="text-xs font-semibold px-2 py-0.5 rounded-full bg-brand-crimson/10 text-brand-crimson flex items-center gap-0.5">
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M19 14l-7 7m0 0l-7-7m7 7V3"></path>
          </svg>
          {{ data.change.leads }}%
        </span>
      } @else {
        <span class="text-xs font-semibold px-2 py-0.5 rounded-full bg-slate-100 text-slate-500 flex items-center gap-0.5">
          0.0%
        </span>
      }
    </div>
    
    <div>
      <div class="text-2xl font-extrabold text-brand-deep tracking-tight">
        {{ data.current.leads | number }}
      </div>
      <span class="text-xs text-slate-400 font-medium">Form submissions this month</span>
    </div>
  </div>
} @else {
  <!-- Loading Skeleton State -->
  <div class="bg-white p-5 rounded-2xl border border-slate-100 shadow-xs h-32 flex flex-col justify-between animate-pulse">
    <div class="flex justify-between items-start">
      <div class="h-3.5 bg-slate-200 rounded-md w-28"></div>
      <div class="h-5 bg-slate-200 rounded-full w-12"></div>
    </div>
    <div>
      <div class="h-8 bg-slate-200 rounded-md w-32 mb-2"></div>
      <div class="h-3 bg-slate-200 rounded-md w-40"></div>
    </div>
  </div>
}
