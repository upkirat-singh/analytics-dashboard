<div class="bg-white p-6 rounded-2xl border border-slate-100 shadow-xs hover:shadow-md transition-all duration-300">
  <div class="mb-5">
    <h3 class="text-sm font-bold text-brand-deep tracking-tight uppercase font-display">Chatbot Operations</h3>
    <p class="text-xs text-slate-400">Interaction volume and bot resolution success rate</p>
  </div>

  @if (chatbot(); as data) {
    <div class="grid grid-cols-1 gap-4">
      
      <!-- Chats Initiated -->
      <div class="p-4 bg-slate-50 border border-slate-100 rounded-xl flex justify-between items-center">
        <div class="flex flex-col">
          <span class="text-xs font-semibold text-slate-400">Total Chats Initiated</span>
          <span class="text-xl font-extrabold text-brand-deep mt-1">{{ data.chatsInitiated | number }}</span>
        </div>
        <div class="p-2 bg-brand-blue/10 text-brand-blue-dark rounded-lg">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"></path>
          </svg>
        </div>
      </div>

      <!-- Resolution Rate -->
      <div class="p-4 bg-slate-50 border border-slate-100 rounded-xl">
        <div class="flex justify-between items-center text-xs font-semibold text-slate-400 mb-2">
          <span>Resolution Success Rate</span>
          <span class="font-bold text-brand-deep">{{ data.resolutionRate }}%</span>
        </div>
        <div class="w-full h-2 bg-slate-100 rounded-full overflow-hidden">
          <div class="h-full bg-brand-deep rounded-full" [style.width.%]="data.resolutionRate"></div>
        </div>
      </div>

      <!-- Average Response Time -->
      <div class="p-4 bg-slate-50 border border-slate-100 rounded-xl flex justify-between items-center">
        <div class="flex flex-col">
          <span class="text-xs font-semibold text-slate-400">Avg Bot Response Time</span>
          <span class="text-lg font-extrabold text-brand-deep mt-1">{{ data.avgResponseTime }} seconds</span>
        </div>
        <span class="text-[10px] font-bold text-brand-teal px-2 py-0.5 rounded-full bg-brand-teal/10">Instant</span>
      </div>

    </div>
  } @else {
    <!-- Loading skeleton -->
    <div class="animate-pulse space-y-4">
      <div class="h-14 bg-slate-100 rounded-xl w-full"></div>
      <div class="h-14 bg-slate-100 rounded-xl w-full"></div>
      <div class="h-14 bg-slate-100 rounded-xl w-full"></div>
    </div>
  }
</div>
